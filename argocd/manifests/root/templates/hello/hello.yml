# #https://artifacthub.io/packages/helm/hello-helm-charts/hello
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello
  namespace: argocd
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: applications
  project: default
  source:
    repoURL: https://cloudecho.github.io/charts/
    targetRevision: 0.1.2
    chart: hello
    helm:
      releaseName: hello
      valueFiles:
      - argocd/manifests/root/templates/hello/values.yml
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
